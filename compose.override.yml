services:

  # Local services are available on their ports, but also available on:
  # http://api.localhost.tiangolo.com: backend
  # http://dashboard.localhost.tiangolo.com: frontend
  # etc. To enable it, update .env, set:
  # DOMAIN=localhost.tiangolo.com
  proxy:
    image: traefik:3.6
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"
      - "8090:8080"
    # Duplicate the command from compose.yml to add --api.insecure=true
    command:
      # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.docker
      # Add a constraint to only use services with the label for this stack
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      # Do not expose all Docker services, only the ones explicitly exposed
      - --providers.docker.exposedbydefault=false
      # Create an entrypoint "http" listening on port 80
      - --entrypoints.http.address=:80
      # Create an entrypoint "https" listening on port 443
      - --entrypoints.https.address=:443
      # Enable the access log, with HTTP requests
      - --accesslog
      # Enable the Traefik log, for configurations and errors
      - --log
      # Enable debug logging for local development
      - --log.level=DEBUG
      # Enable the Dashboard and API
      - --api
      # Enable the Dashboard and API in insecure mode for local development
      - --api.insecure=true
    labels:
      # Enable Traefik for this service, to make it available in the public network
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      # Dummy https-redirect middleware that doesn't really redirect, only to
      # allow running it locally
      - traefik.http.middlewares.https-redirect.contenttype.autodetect=false
    networks:
      - traefik-public
      - default

  db:
    restart: "no"
    ports:
      - "5432:5432"

  adminer:
    restart: "no"
    ports:
      - "8080:8080"

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    develop:
      watch:
        # Source is bind-mounted below for live reload; only rebuild the image
        # when dependencies change.
        - path: ./backend/pyproject.toml
          action: rebuild
    volumes:
      # Live-mount the source so edits hot-reload with no rebuild/cp cycle.
      # The venv lives at /app/.venv (outside this path), so it's untouched.
      # htmlcov still lands on the host since it's under ./backend.
      - ./backend:/app/backend
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"
      # Force watchfiles to poll so `fastapi run --reload` fires on changes that
      # arrive over the bind mount (inotify doesn't reliably cross it).
      WATCHFILES_FORCE_POLLING: "true"

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  frontend:
    restart: "no"
    ports:
      - "5173:5173"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev-stage
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      # Live-mount the source so Vite HMR picks up edits without a rebuild.
      - ./frontend:/app/frontend
      # Anonymous volume keeps the image's bun-installed node_modules instead of
      # letting the (host-arch / absent) host node_modules shadow them.
      - /app/frontend/node_modules
    develop:
      watch:
        # Source is bind-mounted above; only rebuild the image when deps change.
        - path: ./frontend/package.json
          action: rebuild

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false
